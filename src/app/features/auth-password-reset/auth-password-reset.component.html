<section class="simple-screen auth-screen" aria-label="Recuperar contraseña">
  <div class="auth-card">
    <div class="auth-hero auth-hero-compact">
      <div class="auth-floral-art auth-floral-art-small" aria-hidden="true">
        <span class="auth-bloom auth-bloom-center"></span>
        <span class="auth-bloom auth-bloom-left"></span>
        <span class="auth-bloom auth-bloom-right"></span>
        <span class="auth-leaf auth-leaf-left"></span>
        <span class="auth-leaf auth-leaf-right"></span>
      </div>
      <p class="auth-brand">Bloomy</p>
      <h2>Recuperar acceso</h2>
      <p class="auth-copy">Solicita tu c&oacute;digo y elige una nueva contrase&ntilde;a.</p>
    </div>

    <label class="auth-field auth-field-lilac">
      <span class="auth-field-label">Correo electrónico</span>
      <input type="email" inputmode="email" autocomplete="email" placeholder="Correo electr&oacute;nico" [value]="email" (input)="email = $any($event.target).value" />
    </label>

    <button class="auth-ghost" type="button" [disabled]="loading || !email.trim()" (click)="requestCode()">Enviar c&oacute;digo</button>

    <label class="auth-field auth-field-peach">
      <span class="auth-field-label">Código</span>
      <input type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="C&oacute;digo" [value]="code" (input)="code = $any($event.target).value" />
    </label>

    <label class="auth-field auth-field-lilac">
      <span class="auth-field-label">Nueva contraseña</span>
      <input type="password" autocomplete="new-password" placeholder="Nueva contrase&ntilde;a" [value]="newPassword" (input)="newPassword = $any($event.target).value" />
    </label>

    @if (localMessage) {
      <p class="form-message success">{{ localMessage }}</p>
    }
    @if (error) {
      <p class="form-message error">{{ error }}</p>
    }

    <button class="auth-primary" type="button" [disabled]="loading || !email.trim() || !code.trim() || !newPassword.trim()" (click)="confirmNewPassword()">
      {{ loading ? 'Guardando...' : 'Actualizar contrase&ntilde;a' }}
    </button>

    <p class="auth-footer-copy">¿Ya recordaste tu acceso? <button class="auth-inline-link" type="button" (click)="loginRequested.emit()">Inicia sesi&oacute;n</button></p>
  </div>
</section>
