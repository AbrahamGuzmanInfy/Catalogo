<section class="simple-screen auth-screen" aria-label="Confirmar cuenta">
  <div class="auth-card">
    <div class="auth-hero auth-hero-compact">
      <div class="auth-floral-art auth-floral-art-small" aria-hidden="true">
        <span class="auth-bloom auth-bloom-center"></span>
        <span class="auth-bloom auth-bloom-left"></span>
        <span class="auth-bloom auth-bloom-right"></span>
        <span class="auth-leaf auth-leaf-left"></span>
        <span class="auth-leaf auth-leaf-right"></span>
      </div>
      <p class="auth-brand">Bloomy</p>
      <h2>Verifica tu cuenta</h2>
      <p class="auth-copy">Ingresa el c&oacute;digo que enviamos a <strong>{{ email }}</strong>.</p>
    </div>

    <label class="auth-field auth-field-lilac">
      <span class="auth-field-label">Código</span>
      <input type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="C&oacute;digo de verificaci&oacute;n" [value]="code" (input)="code = $any($event.target).value" />
    </label>

    @if (localMessage) {
      <p class="form-message success">{{ localMessage }}</p>
    }
    @if (error) {
      <p class="form-message error">{{ error }}</p>
    }

    <button class="auth-primary" type="button" [disabled]="loading || !code.trim()" (click)="confirm()">
      {{ loading ? 'Confirmando...' : 'Confirmar cuenta' }}
    </button>

    <button class="auth-link auth-secondary-link" type="button" (click)="resend()">Reenviar c&oacute;digo</button>
    <p class="auth-footer-copy">¿Ya qued&oacute; lista tu cuenta? <button class="auth-inline-link" type="button" (click)="loginRequested.emit()">Inicia sesi&oacute;n</button></p>
  </div>
</section>
