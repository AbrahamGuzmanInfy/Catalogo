<section class="simple-screen profile-screen" aria-label="Perfil">
  @if (session.user; as user) {
    <div class="profile-card">
      <img src="/icons/tdesign/user.svg" alt="" aria-hidden="true" />
      <h2>{{ user.nombre }}</h2>
      <p>{{ user.email }}</p>
    </div>

    <section class="profile-role-switch" aria-label="Rol de cuenta">
      <div class="profile-switch-copy">
        <strong>Rol activo</strong>
        <small>{{ user.rol === 'dueno' ? 'Dueño' : user.rol === 'admin' ? 'Administrador' : 'Cliente' }}</small>
      </div>
    </section>

    @if (session.isOwnerRole) {
      <button class="profile-action" type="button" (click)="productsList.emit()">Productos</button>
      <button class="profile-secondary" type="button" (click)="categoriesList.emit()">Categorías</button>
    }
    <button class="profile-secondary" type="button" (click)="orders.emit()">Mis Pedidos</button>
    <button class="profile-secondary" type="button">Direcciones</button>
    <button class="profile-secondary" type="button" (click)="signOutRequested.emit()">Cerrar sesión</button>
  }
</section>
